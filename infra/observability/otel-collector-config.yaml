receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  debug:
    verbosity: basic

  prometheus:
    endpoint: 0.0.0.0:9464

  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - otlp/jaeger
        - otlp/tempo
        - debug

    metrics:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - prometheus
        - debug

    logs:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - otlphttp/loki
        - debug
